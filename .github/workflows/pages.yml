name: Deploy web UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 — Node 24 runtime
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/setup-node v6.4.0 — Node 24 runtime
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run web:build
        env:
          # The repo path under github.io. If your repo is not at the root path,
          # set this so Vite generates correct asset URLs.
          VITE_BASE: "/${{ github.event.repository.name }}/"
          VITE_REPO_OWNER: ${{ github.repository_owner }}
          VITE_REPO_NAME: ${{ github.event.repository.name }}

      # actions/configure-pages v6.0.0 — Node 24 runtime
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      # actions/upload-pages-artifact v5.0.0 — composite action (no Node runtime)
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      # actions/deploy-pages v5.0.0 — Node 24 runtime
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
